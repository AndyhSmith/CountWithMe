<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Count With Me!</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── App shell ─────────────────────────────────────────────────── */
    #app {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: background 1.2s ease-in-out;
      position: relative;
      overflow: hidden;
    }

    /* ── Theme backgrounds ─────────────────────────────────────────── */
    #app.theme-animals { background: linear-gradient(135deg, #FF9A3C 0%, #FFD166 100%); }
    #app.theme-food    { background: linear-gradient(135deg, #FF6B6B 0%, #FF9EBC 100%); }
    #app.theme-space   { background: linear-gradient(135deg, #2D1B69 0%, #11998E 100%); }
    #app.theme-end     { background: linear-gradient(135deg, #6C5CE7 0%, #fd79a8 100%); }

    /* ── Floating background bubbles (decorative) ──────────────────── */
    .bg-bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      animation: floatBubble linear infinite;
      pointer-events: none;
    }

    @keyframes floatBubble {
      0%   { transform: translateY(110vh) scale(0.8); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
    }

    /* ── Screen visibility ─────────────────────────────────────────── */
    .screen { width: 100%; height: 100%; display: flex; flex-direction: column;
              align-items: center; justify-content: center; }
    .hidden { display: none !important; }

    /* ── Game screen ───────────────────────────────────────────────── */
    #game-screen { gap: clamp(16px, 4vh, 32px); }

    /* Round progress dots */
    #round-dots {
      display: flex; gap: 12px; margin-bottom: 4px;
    }
    .round-dot {
      width: 18px; height: 18px; border-radius: 50%;
      background: rgba(255,255,255,0.35);
      border: 3px solid rgba(255,255,255,0.6);
      transition: background 0.4s, transform 0.4s;
    }
    .round-dot.done {
      background: white;
      transform: scale(1.2);
    }

    /* Emoji display area */
    #emoji-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: clamp(10px, 3vw, 28px);
      padding: clamp(16px, 4vw, 36px);
      min-height: 38vh;
      max-width: 95vw;
    }

    .emoji-item {
      font-size: clamp(60px, 13vw, 96px);
      opacity: 0;
      transform: scale(0);
      display: inline-block;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
      transition: filter 0.2s;
    }

    .emoji-item.visible {
      opacity: 1;
      animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .emoji-item.tappable {
      opacity: 1;
      cursor: pointer;
      animation: gentleWiggle 2s ease-in-out infinite;
    }

    .emoji-item.highlighted {
      opacity: 1;
      animation: highlightPop 0.35s ease-out forwards !important;
    }

    /* Tap hint */
    #tap-hint {
      font-size: clamp(32px, 7vw, 52px);
      opacity: 0;
      transition: opacity 0.5s;
      animation: pulseHint 1.5s ease-in-out infinite;
      pointer-events: none;
    }
    #tap-hint.visible { opacity: 1; }

    /* Number buttons */
    #number-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(8px, 2.5vw, 20px);
      flex-wrap: wrap;
      padding: clamp(8px, 2vw, 16px);
    }

    .num-btn {
      width:  clamp(72px, 16vw, 108px);
      height: clamp(72px, 16vw, 108px);
      border-radius: 50%;
      font-size: clamp(28px, 6.5vw, 48px);
      font-weight: 900;
      border: 5px solid rgba(255,255,255,0.65);
      color: white;
      cursor: pointer;
      text-shadow: 0 2px 6px rgba(0,0,0,0.3);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25), inset 0 2px 0 rgba(255,255,255,0.35);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      pointer-events: none;
      opacity: 0.45;
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.3s;
      position: relative;
    }

    .num-btn.active {
      pointer-events: auto;
      opacity: 1;
      animation: idleBounce 1.3s ease-in-out infinite;
    }

    .num-btn:active { transform: scale(0.88) !important; box-shadow: 0 3px 10px rgba(0,0,0,0.3); }

    .num-btn[data-value="1"] { background: linear-gradient(145deg, #FF6B6B, #ee5a24); }
    .num-btn[data-value="2"] { background: linear-gradient(145deg, #FFA500, #e67e22); }
    .num-btn[data-value="3"] { background: linear-gradient(145deg, #54A0FF, #2980b9); }
    .num-btn[data-value="4"] { background: linear-gradient(145deg, #9b59b6, #6C5CE7); }
    .num-btn[data-value="5"] { background: linear-gradient(145deg, #00cec9, #00B894); }

    /* Staggered bounce delays */
    .num-btn[data-value="1"].active { animation-delay: 0s; }
    .num-btn[data-value="2"].active { animation-delay: 0.13s; }
    .num-btn[data-value="3"].active { animation-delay: 0.26s; }
    .num-btn[data-value="4"].active { animation-delay: 0.39s; }
    .num-btn[data-value="5"].active { animation-delay: 0.52s; }

    /* Wobble applied to button container */
    #number-buttons.wobble { animation: wobble 0.6s ease-out; }

    /* ── Celebration screen ─────────────────────────────────────────── */
    #celebration-screen {
      position: absolute;
      inset: 0;
      background: transparent;
      pointer-events: none;
      z-index: 100;
    }

    #confetti-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #star-burst {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: clamp(80px, 20vw, 160px);
      pointer-events: none;
      z-index: 110;
      filter: drop-shadow(0 0 30px gold);
    }
    #star-burst.show {
      animation: starBurst 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* ── End screen ─────────────────────────────────────────────────── */
    #end-screen { gap: 24px; }

    #dancing-emojis {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(8px, 3vw, 20px);
      max-width: 90vw;
    }

    .dancing-emoji {
      font-size: clamp(52px, 12vw, 88px);
      display: inline-block;
      animation: dance 0.85s ease-in-out infinite;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }

    #play-again-btn {
      font-size: clamp(40px, 10vw, 64px);
      background: rgba(255,255,255,0.25);
      border: 5px solid rgba(255,255,255,0.7);
      border-radius: 50%;
      width: clamp(90px, 20vw, 130px);
      height: clamp(90px, 20vw, 130px);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      animation: idleBounce 1.2s ease-in-out infinite;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transition: transform 0.12s;
    }
    #play-again-btn:active { transform: scale(0.88) !important; }

    /* ── Keyframe animations ────────────────────────────────────────── */
    @keyframes popIn {
      0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
      55%  { transform: scale(1.35) rotate(6deg);  opacity: 1; }
      75%  { transform: scale(0.88) rotate(-3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg);     opacity: 1; }
    }

    @keyframes highlightPop {
      0%   { transform: scale(1);    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
      45%  { transform: scale(1.5);  filter: drop-shadow(0 0 18px gold) brightness(1.3); }
      100% { transform: scale(1.18); filter: drop-shadow(0 0 12px gold) brightness(1.15); }
    }

    @keyframes gentleWiggle {
      0%,100% { transform: scale(1) rotate(0deg); }
      25%     { transform: scale(1.05) rotate(-4deg); }
      75%     { transform: scale(1.05) rotate(4deg); }
    }

    @keyframes wobble {
      0%,100% { transform: translateX(0); }
      15%     { transform: translateX(-14px) rotate(-2deg); }
      30%     { transform: translateX(14px)  rotate(2deg); }
      45%     { transform: translateX(-9px); }
      60%     { transform: translateX(9px); }
      75%     { transform: translateX(-4px); }
    }

    @keyframes idleBounce {
      0%,100% { transform: translateY(0) scale(1); }
      50%     { transform: translateY(-10px) scale(1.06); }
    }

    @keyframes starBurst {
      0%   { transform: translate(-50%,-50%) scale(0) rotate(0deg);    opacity: 0; }
      50%  { transform: translate(-50%,-50%) scale(1.6) rotate(180deg); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1) rotate(360deg);  opacity: 1; }
    }

    @keyframes dance {
      0%,100% { transform: translateY(0)     rotate(0deg)    scale(1); }
      20%     { transform: translateY(-22px)  rotate(-9deg)   scale(1.12); }
      40%     { transform: translateY(-14px)  rotate(5deg)    scale(1.08); }
      60%     { transform: translateY(-20px)  rotate(-6deg)   scale(1.1); }
      80%     { transform: translateY(-10px)  rotate(8deg)    scale(1.06); }
    }

    @keyframes pulseHint {
      0%,100% { transform: scale(1) translateY(0);   opacity: 0.75; }
      50%     { transform: scale(1.22) translateY(-4px); opacity: 1; }
    }

    @keyframes floatBubble {
      0%   { transform: translateY(110vh) scale(0.8); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
    }
  </style>
</head>
<body>
<div id="app" class="theme-animals">

  <!-- Decorative floating bubbles (injected by JS) -->
  <div id="bubbles"></div>

  <!-- ── GAME SCREEN ─────────────────────────────────────────────── -->
  <div id="game-screen" class="screen">
    <div id="round-dots">
      <div class="round-dot" data-round="0"></div>
      <div class="round-dot" data-round="1"></div>
      <div class="round-dot" data-round="2"></div>
      <div class="round-dot" data-round="3"></div>
      <div class="round-dot" data-round="4"></div>
    </div>

    <div id="emoji-grid"></div>
    <div id="tap-hint">👆</div>

    <div id="number-buttons">
      <button class="num-btn" data-value="1">1</button>
      <button class="num-btn" data-value="2">2</button>
      <button class="num-btn" data-value="3">3</button>
      <button class="num-btn" data-value="4">4</button>
      <button class="num-btn" data-value="5">5</button>
    </div>
  </div>

  <!-- ── CELEBRATION OVERLAY ─────────────────────────────────────── -->
  <div id="celebration-screen" class="hidden">
    <canvas id="confetti-canvas"></canvas>
    <div id="star-burst">⭐</div>
  </div>

  <!-- ── END SCREEN ─────────────────────────────────────────────── -->
  <div id="end-screen" class="screen hidden">
    <div id="dancing-emojis"></div>
    <button id="play-again-btn">▶️</button>
  </div>

</div>

<script>
'use strict';

/* ─────────────────────────────────────────────────────────────────────
   CONFIG
───────────────────────────────────────────────────────────────────── */
const THEMES = {
  animals: {
    emojis: ['🐸','🐥','🐰','🐱','🐶','🐻','🐼','🦆'],
    names:  ['frogs','chicks','bunnies','cats','dogs','bears','pandas','ducks'],
    bgClass: 'theme-animals',
  },
  food: {
    emojis: ['🍎','🍓','🍊','🍋','🍇','🍉','🍒'],
    names:  ['apples','strawberries','oranges','lemons','grapes','watermelons','cherries'],
    bgClass: 'theme-food',
  },
  space: {
    emojis: ['⭐','🌟','🌙','🪐','🚀','☁️','🌈'],
    names:  ['stars','sparkles','moons','planets','rockets','clouds','rainbows'],
    bgClass: 'theme-space',
  },
};

const THEME_ORDER = ['animals','food','space','animals','food'];
const TOTAL_ROUNDS = 5;
const REVEAL_DELAY = 750;       // ms between each emoji pop-in
const CELEBRATION_DURATION = 3600; // ms of confetti before auto-advance

const NUMBER_WORDS = ['One!','Two!','Three!','Four!','Five!'];
const CONFETTI_COLORS = [
  '#FF6B6B','#FFA500','#FFD700','#54A0FF','#9b59b6',
  '#00cec9','#00B894','#fd79a8','#e17055','#fdcb6e',
];

/* ─────────────────────────────────────────────────────────────────────
   STATE
───────────────────────────────────────────────────────────────────── */
const state = {
  round: 0,
  gamePhase: 'idle',  // idle | revealing | tapping | answering | celebrating | ended
  targetCount: 0,
  revealedCount: 0,
  tappedCount: 0,
  currentEmoji: '',
  currentEmojiName: '',
  audioCtx: null,
  confettiParticles: [],
  confettiAnimId: null,
};

/* ─────────────────────────────────────────────────────────────────────
   DOM REFS
───────────────────────────────────────────────────────────────────── */
const app          = document.getElementById('app');
const gameScreen   = document.getElementById('game-screen');
const emojiGrid    = document.getElementById('emoji-grid');
const tapHint      = document.getElementById('tap-hint');
const numButtons   = document.querySelectorAll('.num-btn');
const numContainer = document.getElementById('number-buttons');
const celebScreen  = document.getElementById('celebration-screen');
const starBurst    = document.getElementById('star-burst');
const canvas       = document.getElementById('confetti-canvas');
const ctx2d        = canvas.getContext('2d');
const endScreen    = document.getElementById('end-screen');
const dancingDiv   = document.getElementById('dancing-emojis');
const playAgainBtn = document.getElementById('play-again-btn');
const roundDots    = document.querySelectorAll('.round-dot');

/* ─────────────────────────────────────────────────────────────────────
   DECORATIVE BUBBLES
───────────────────────────────────────────────────────────────────── */
function createBubbles() {
  const container = document.getElementById('bubbles');
  for (let i = 0; i < 8; i++) {
    const b = document.createElement('div');
    b.className = 'bg-bubble';
    const size = 40 + Math.random() * 120;
    b.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${8 + Math.random() * 14}s;
      animation-delay: ${Math.random() * 12}s;
    `;
    container.appendChild(b);
  }
}

/* ─────────────────────────────────────────────────────────────────────
   AUDIO — Web Speech API
───────────────────────────────────────────────────────────────────── */
let preferredVoice = null;

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  preferredVoice = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('samantha'))
    || voices.find(v => v.lang.startsWith('en-') && !v.name.toLowerCase().includes('whisper'))
    || voices.find(v => v.lang.startsWith('en'))
    || null;
}
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text, onEnd) {
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate  = 0.82;
  utt.pitch = 1.25;
  utt.volume = 1;
  if (preferredVoice) utt.voice = preferredVoice;
  if (onEnd) {
    let fired = false;
    const once = () => { if (!fired) { fired = true; onEnd(); } };
    utt.onend = once;
    // iOS Safari sometimes never fires onend — timeout is the fallback
    const words = text.trim().split(/\s+/).length;
    setTimeout(once, Math.round(words * 600) + 1000);
  }
  speechSynthesis.speak(utt);
}

/* ─────────────────────────────────────────────────────────────────────
   AUDIO — Web Audio API (chimes)
───────────────────────────────────────────────────────────────────── */
function initAudio() {
  if (!state.audioCtx) {
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (state.audioCtx.state === 'suspended') {
    state.audioCtx.resume();
  }
}

function playTone(freq, startTime, duration, gain = 0.4, type = 'sine') {
  const ac = state.audioCtx;
  const osc = ac.createOscillator();
  const env = ac.createGain();
  osc.connect(env);
  env.connect(ac.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  env.gain.setValueAtTime(0, startTime);
  env.gain.linearRampToValueAtTime(gain, startTime + 0.02);
  env.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
}

function playChime(type) {
  if (!state.audioCtx) return;
  const now = state.audioCtx.currentTime;
  if (type === 'pop') {
    playTone(880, now, 0.12, 0.18);
  } else if (type === 'correct') {
    // Ascending arpeggio: C5 E5 G5
    playTone(523, now,       0.18, 0.35);
    playTone(659, now + 0.14, 0.18, 0.35);
    playTone(784, now + 0.28, 0.24, 0.35);
  } else if (type === 'wrong') {
    playTone(330, now, 0.22, 0.15);
    playTone(294, now + 0.18, 0.22, 0.12);
  } else if (type === 'tada') {
    // Big chord burst
    [523, 659, 784, 1047].forEach((f, i) => {
      playTone(f, now + i * 0.06, 0.45, 0.28);
    });
  }
}

/* ─────────────────────────────────────────────────────────────────────
   ROUND DOTS
───────────────────────────────────────────────────────────────────── */
function updateDots() {
  roundDots.forEach((dot, i) => {
    dot.classList.toggle('done', i < state.round);
  });
}

/* ─────────────────────────────────────────────────────────────────────
   GAME LOGIC
───────────────────────────────────────────────────────────────────── */
function initGame() {
  state.round = 0;
  endScreen.classList.add('hidden');
  gameScreen.classList.remove('hidden');
  startRound(0);
}

function startRound(roundIndex) {
  // Pick theme
  const themeKey = THEME_ORDER[roundIndex];
  const theme = THEMES[themeKey];

  // Swap background
  ['theme-animals','theme-food','theme-space','theme-end'].forEach(c => app.classList.remove(c));
  app.classList.add(theme.bgClass);

  // Pick random emoji + count
  const idx = Math.floor(Math.random() * theme.emojis.length);
  state.currentEmoji     = theme.emojis[idx];
  state.currentEmojiName = theme.names[idx];
  state.targetCount = Math.floor(Math.random() * 5) + 1;
  state.revealedCount = 0;
  state.tappedCount   = 0;

  // Update dots
  updateDots();

  // Reset UI
  tapHint.classList.remove('visible');
  numContainer.classList.remove('wobble');
  numButtons.forEach(b => { b.classList.remove('active'); });

  // Build emoji grid
  emojiGrid.innerHTML = '';
  for (let i = 0; i < state.targetCount; i++) {
    const span = document.createElement('span');
    span.className = 'emoji-item';
    span.textContent = state.currentEmoji;
    span.dataset.index = i;
    emojiGrid.appendChild(span);
  }

  // Short pause then start revealing
  state.gamePhase = 'revealing';
  setTimeout(revealNext, 400);
}

function revealNext() {
  if (state.gamePhase !== 'revealing') return;

  if (state.revealedCount >= state.targetCount) {
    // All revealed — ask the question
    setTimeout(() => {
      speak(`How many ${state.currentEmojiName}?`, () => {
        enableTapMode();
      });
    }, 300);
    return;
  }

  const items = emojiGrid.querySelectorAll('.emoji-item');
  const item  = items[state.revealedCount];
  item.classList.add('visible');

  // Chime + voice
  playChime('pop');
  speak(NUMBER_WORDS[state.revealedCount]);

  state.revealedCount++;
  setTimeout(revealNext, REVEAL_DELAY);
}

function enableTapMode() {
  state.gamePhase = 'tapping';
  state.tappedCount = 0;
  tapHint.classList.add('visible');

  const items = emojiGrid.querySelectorAll('.emoji-item');
  items.forEach(item => {
    item.classList.add('tappable');
    item.classList.remove('highlighted');
  });

  // Also enable answer buttons now (child can answer without tapping)
  enableAnswerButtons();
}

function handleEmojiTap(item) {
  if (state.gamePhase !== 'tapping' && state.gamePhase !== 'answering') return;
  if (item.classList.contains('highlighted')) return; // already tapped

  item.classList.add('highlighted');
  state.tappedCount++;
  playChime('pop');
  speak(NUMBER_WORDS[state.tappedCount - 1]);

  if (state.tappedCount === state.targetCount) {
    tapHint.classList.remove('visible');
  }
}

function enableAnswerButtons() {
  state.gamePhase = 'answering';
  numButtons.forEach(b => b.classList.add('active'));
}

function handleAnswer(value) {
  if (state.gamePhase !== 'answering') return;
  initAudio(); // ensure audio context is live

  if (value === state.targetCount) {
    handleCorrect();
  } else {
    handleWrong();
  }
}

function handleCorrect() {
  state.gamePhase = 'celebrating';
  numButtons.forEach(b => b.classList.remove('active'));

  playChime('tada');
  speak(`Great job! That's ${state.targetCount}!`);
  showCelebration();

  setTimeout(endCelebration, CELEBRATION_DURATION);
}

function handleWrong() {
  playChime('wrong');
  speak('Try again!');

  numContainer.classList.remove('wobble');
  // Force reflow to restart animation
  void numContainer.offsetWidth;
  numContainer.classList.add('wobble');
  setTimeout(() => numContainer.classList.remove('wobble'), 650);
}

function endCelebration() {
  stopConfetti();
  hideCelebration();
  state.round++;

  if (state.round >= TOTAL_ROUNDS) {
    showEndScreen();
  } else {
    startRound(state.round);
  }
}

/* ─────────────────────────────────────────────────────────────────────
   CELEBRATION
───────────────────────────────────────────────────────────────────── */
function showCelebration() {
  celebScreen.classList.remove('hidden');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  starBurst.classList.remove('show');
  void starBurst.offsetWidth;
  starBurst.classList.add('show');

  startConfetti();
}

function hideCelebration() {
  celebScreen.classList.add('hidden');
  starBurst.classList.remove('show');
}

/* ─────────────────────────────────────────────────────────────────────
   CONFETTI ENGINE
───────────────────────────────────────────────────────────────────── */
function startConfetti() {
  state.confettiParticles = [];
  const W = canvas.width;
  const H = canvas.height;

  for (let i = 0; i < 160; i++) {
    const shape = ['circle','rect','star'][Math.floor(Math.random() * 3)];
    state.confettiParticles.push({
      x: W * 0.3 + Math.random() * W * 0.4,
      y: H * 0.45,
      vx: (Math.random() - 0.5) * 14,
      vy: -(Math.random() * 14 + 4),
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      size: 8 + Math.random() * 14,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.18,
      shape,
      alpha: 1,
    });
  }

  animateConfetti();
}

function animateConfetti() {
  state.confettiAnimId = requestAnimationFrame(animateConfetti);
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);

  state.confettiParticles = state.confettiParticles.filter(p => p.alpha > 0.05);

  if (state.confettiParticles.length === 0) {
    stopConfetti();
    return;
  }

  state.confettiParticles.forEach(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.35; // gravity
    p.vx *= 0.99; // slight drag
    p.rotation += p.rotSpeed;

    if (p.y > canvas.height * 0.6) p.alpha -= 0.012;

    ctx2d.save();
    ctx2d.globalAlpha = p.alpha;
    ctx2d.fillStyle = p.color;
    ctx2d.translate(p.x, p.y);
    ctx2d.rotate(p.rotation);

    if (p.shape === 'circle') {
      ctx2d.beginPath();
      ctx2d.arc(0, 0, p.size / 2, 0, Math.PI * 2);
      ctx2d.fill();
    } else if (p.shape === 'rect') {
      ctx2d.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    } else {
      drawStar(ctx2d, 0, 0, 5, p.size / 2, p.size / 4);
    }

    ctx2d.restore();
  });
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
  let angle = -Math.PI / 2;
  const step = Math.PI / spikes;
  ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
    angle += step;
  }
  ctx.closePath();
  ctx.fill();
}

function stopConfetti() {
  if (state.confettiAnimId) {
    cancelAnimationFrame(state.confettiAnimId);
    state.confettiAnimId = null;
  }
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
}

/* ─────────────────────────────────────────────────────────────────────
   END SCREEN
───────────────────────────────────────────────────────────────────── */
const ALL_DANCE_EMOJIS = [
  '🎉','🌟','🎈','🦋','🌈','🎊','🐸','🍓','⭐','🦆',
  '🎀','🌸','🥳','🐱','🎵','🐰','🍒','🚀','🌙','🐥',
];

function showEndScreen() {
  state.gamePhase = 'ended';
  gameScreen.classList.add('hidden');
  app.classList.remove('theme-animals','theme-food','theme-space');
  app.classList.add('theme-end');
  endScreen.classList.remove('hidden');

  // Fill dancing emoji
  dancingDiv.innerHTML = '';
  const chosen = ALL_DANCE_EMOJIS.sort(() => Math.random() - 0.5).slice(0, 10);
  chosen.forEach((em, i) => {
    const span = document.createElement('span');
    span.className = 'dancing-emoji';
    span.textContent = em;
    span.style.animationDelay = `${i * 0.09}s`;
    dancingDiv.appendChild(span);
  });

  updateDots();
  roundDots.forEach(d => d.classList.add('done'));

  playChime('tada');
  setTimeout(() => speak("You're amazing! You counted everything! Yay!"), 400);
}

function resetAndReplay() {
  initAudio();
  endScreen.classList.add('hidden');
  gameScreen.classList.remove('hidden');
  initGame();
}

/* ─────────────────────────────────────────────────────────────────────
   EVENT LISTENERS
───────────────────────────────────────────────────────────────────── */
numButtons.forEach(btn => {
  const handler = () => {
    initAudio();
    handleAnswer(parseInt(btn.dataset.value, 10));
  };
  btn.addEventListener('click', handler);
  btn.addEventListener('touchstart', e => {
    e.preventDefault(); // prevents the ghost click that would fire handler twice
    handler();
  }, { passive: false });
});

// Emoji tap-to-count
emojiGrid.addEventListener('click', e => {
  const item = e.target.closest('.emoji-item');
  if (item) {
    initAudio();
    handleEmojiTap(item);
  }
});
emojiGrid.addEventListener('touchstart', e => {
  const item = e.target.closest('.emoji-item');
  if (item) {
    e.preventDefault();
    initAudio();
    handleEmojiTap(item);
  }
}, { passive: false });

playAgainBtn.addEventListener('click', resetAndReplay);

// Resize confetti canvas if window resizes
window.addEventListener('resize', () => {
  if (!celebScreen.classList.contains('hidden')) {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
});

/* ─────────────────────────────────────────────────────────────────────
   KICK OFF
───────────────────────────────────────────────────────────────────── */
createBubbles();
initGame();
</script>
